<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download image.gif</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --accent: #58a6ff;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(88, 166, 255, 0.25);
        }

        .download-btn:hover {
            background: #4c94e8;
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.4);
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.3);
        }

        .download-btn .icon {
            font-size: 1.4rem;
        }

        .subtitle {
            margin-top: 16px;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://media.githubusercontent.com/media/indiamonda/uselessgif/main/image.gif" download="image.gif" class="download-btn">
            <span class="icon">💾</span>
            Download image.gif
        </a>
        <p class="subtitle">Click the button to download the file</p>
    </div>
</body>
</html>
